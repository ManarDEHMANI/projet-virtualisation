apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-role
  namespace: task-manager
rules:
  - apiGroups: ["", "apps", "networking.k8s.io", "rbac.authorization.k8s.io"]
    resources:
      [
        "pods",
        "services",
        "configmaps",
        "secrets",
        "deployments",
        "statefulsets",
        "ingresses",
        "roles",
        "rolebindings"
      ]
    verbs: ["*"]