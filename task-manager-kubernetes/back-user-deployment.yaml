apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-back-user
  template:
    metadata:
      labels:
        app: task-manager-back-user
    spec:
      containers:
        - name: task-manager-back-user
          image: dehmanim/task-manager-back-user:1.0
          ports:
            - containerPort: 3000